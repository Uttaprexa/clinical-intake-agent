server {
    listen 80;

    # Serve the built React app
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri /index.html;
    }

    # Proxy API calls to the backend container over the docker network --
    # this is what makes relative fetch("/api/...") calls from the browser
    # actually reach FastAPI, instead of hitting this static file server.
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
